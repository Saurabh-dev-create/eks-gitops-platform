apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: slack-config
  namespace: monitoring
  labels:
    release: monitoring
spec:
  route:
    receiver: slack
    groupBy:
      - alertname
    groupWait: 10s
    groupInterval: 30s
    repeatInterval: 2h

  receivers:
    - name: slack
      slackConfigs:
        - apiURL:
            name: alertmanager-slack
            key: webhook

          channel: "#alerts"

          sendResolved: true

          title: "{{ .CommonLabels.alertname }}"

          text: |
            *Alert:* {{ .CommonLabels.alertname }}
            *Severity:* {{ .CommonLabels.severity }}

            {{ range .Alerts }}
            {{ .Annotations.summary }}

            {{ .Annotations.description }}
            {{ end }}
