alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 2h

    receivers:
      - name: slack
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"

            channel: "#alerts"

            send_resolved: true

            title: "{{ .CommonLabels.alertname }}"

            text: |
              *Alert:* {{ .CommonLabels.alertname }}
              *Severity:* {{ .CommonLabels.severity }}

              {{ range .Alerts }}
              {{ .Annotations.summary }}

              {{ .Annotations.description }}
              {{ end }}
