mode: deployment

image:
  repository: otel/opentelemetry-collector-k8s

config:
  exporters:
    debug: {}

    otlp:
      endpoint: tempo.monitoring.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers:
          - otlp
          - jaeger
          - zipkin

        processors:
          - memory_limiter
          - batch

        exporters:
          - debug
          - otlp