apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kyverno
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kyverno

  selector:
    matchLabels:
      app.kubernetes.io/name: kyverno-admission-controller

  endpoints:
    - port: metrics-port
      interval: 30s
      path: /metrics
