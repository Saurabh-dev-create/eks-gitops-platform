apiVersion: v1
kind: Pod

metadata:
  name: crashloop-demo
  namespace: monitoring

  labels:
    app: crashloop-demo

spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534

  restartPolicy: Always

  containers:
    - name: crash
      image: busybox:1.36

      command:
        - sh
        - -c
        - exit 1

      securityContext:
        allowPrivilegeEscalation: false

      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
