apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: database-prod
  namespace: argocd

spec:
  project: platform-project

  source:
    repoURL: https://github.com/Saurabh-dev-create/eks-gitops-platform.git
    targetRevision: prod
    path: apps/database

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
