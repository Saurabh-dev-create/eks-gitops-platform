apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: canary
  namespace: argocd

spec:
  project: platform-project

  source:
    repoURL: https://github.com/Saurabh-dev-create/eks-gitops-platform.git
    targetRevision: main
    path: rollouts/canary

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
