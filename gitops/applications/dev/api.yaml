apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: api-dev
  namespace: argocd

spec:
  project: platform-project

  source:
    repoURL: https://github.com/Saurabh-dev-create/eks-gitops-platform.git
    targetRevision: dev
    path: apps/api

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
