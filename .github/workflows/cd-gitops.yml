name: Platform CD

on:
  workflow_run:
    workflows:
      - Platform CI
    types:
      - completed

permissions:
  contents: write

jobs:
  platform-cd:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'dev' ||
       github.event.workflow_run.head_branch == 'stage' ||
       github.event.workflow_run.head_branch == 'prod')

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Checkout Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      ####################################################
      # Build Images
      ####################################################

      - name: Build Frontend
        run: |
          docker build \
            -t frontend:$IMAGE_TAG \
            ./apps/frontend

      - name: Build API
        run: |
          docker build \
            -t api:$IMAGE_TAG \
            ./apps/api

      - name: Build Auth
        run: |
          docker build \
            -t auth:$IMAGE_TAG \
            ./apps/auth

      ####################################################
      # Tag Images
      ####################################################

      - name: Tag Images
        run: |
          docker tag frontend:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:$IMAGE_TAG
          docker tag api:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/api:$IMAGE_TAG
          docker tag auth:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/auth:$IMAGE_TAG

      ####################################################
      # Push Images
      ####################################################

      - name: Push Images
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:$IMAGE_TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/api:$IMAGE_TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/auth:$IMAGE_TAG

      ####################################################
      # Update GitOps Manifests
      ####################################################

      - name: Update Frontend Deployment
        run: |
          sed -i "s|image:.*|image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:$IMAGE_TAG|" apps/frontend/deployment.yaml

      - name: Update API Deployment
        run: |
          sed -i "s|image:.*|image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/api:$IMAGE_TAG|" apps/api/deployment.yaml

      - name: Update Auth Deployment
        run: |
          sed -i "s|image:.*|image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/auth:$IMAGE_TAG|" apps/auth/deployment.yaml

      ####################################################
      # Commit Changes
      ####################################################

      - name: Commit Manifest Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps/frontend/deployment.yaml
          git add apps/api/deployment.yaml
          git add apps/auth/deployment.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes."
            exit 0
          fi

          git commit -m "Update application images to $IMAGE_TAG [skip ci]"

      ####################################################
      # Push Back To Same Branch
      ####################################################

      - name: Push Changes
        run: |
          git push origin $TARGET_BRANCH
