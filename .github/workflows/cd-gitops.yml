name: Platform CD

on:
  workflow_run:
    workflows: ["Platform CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  platform-cd:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      ####################################################
      # FRONTEND
      ####################################################

      - name: Build Frontend Image
        run: |
          docker build \
            -t frontend:$IMAGE_TAG \
            ./apps/frontend

      - name: Tag Frontend Image
        run: |
          docker tag \
            frontend:$IMAGE_TAG \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:$IMAGE_TAG

      - name: Push Frontend Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:$IMAGE_TAG

      ####################################################
      # API
      ####################################################

      - name: Build API Image
        run: |
          docker build \
            -t api:$IMAGE_TAG \
            ./apps/api

      - name: Tag API Image
        run: |
          docker tag \
            api:$IMAGE_TAG \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/api:$IMAGE_TAG

      - name: Push API Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/api:$IMAGE_TAG

      ####################################################
      # AUTH
      ####################################################

      - name: Build Auth Image
        run: |
          docker build \
            -t auth:$IMAGE_TAG \
            ./apps/auth

      - name: Tag Auth Image
        run: |
          docker tag \
            auth:$IMAGE_TAG \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/auth:$IMAGE_TAG

      - name: Push Auth Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/auth:$IMAGE_TAG

      ####################################################
      # UPDATE GITOPS MANIFESTS
      ####################################################

      - name: Update Frontend Deployment
        run: |
          sed -i "s|image:.*|image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:$IMAGE_TAG|" apps/frontend/deployment.yaml

      - name: Update API Deployment
        run: |
          sed -i "s|image:.*|image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/api:$IMAGE_TAG|" apps/api/deployment.yaml

      - name: Update Auth Deployment
        run: |
          sed -i "s|image:.*|image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/auth:$IMAGE_TAG|" apps/auth/deployment.yaml

      ####################################################
      # SINGLE COMMIT
      ####################################################

      - name: Commit Manifest Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            apps/frontend/deployment.yaml \
            apps/api/deployment.yaml \
            apps/auth/deployment.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          

          git commit -m "Update application images to $IMAGE_TAG [skip ci]"

      ####################################################
      # SINGLE PUSH
      ####################################################

      - name: Push Changes
        run: |
          git push origin main
