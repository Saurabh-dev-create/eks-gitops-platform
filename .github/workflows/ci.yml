name: Platform CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'apps/**/deployment.yaml'
  pull_request:

jobs:
  platform-ci:
    name: CI - ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - frontend
          - api
          - auth

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ matrix.app }}:${{ github.sha }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.app }}:${{ github.sha }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Validate Kubernetes Manifests
        run: |
          test -f deployment.yaml
          test -f service.yaml
          test -f kustomization.yaml

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.2"

      - name: Validate Kustomize Build
        run: |
          kustomize build .

      - name: CI Completed
        run: |
          echo "✅ ${{ matrix.app }} CI completed successfully."
