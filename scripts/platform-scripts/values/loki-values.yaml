deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

singleBinary:
  replicas: 1

  persistence:
    enabled: false

  extraVolumes:
    - name: storage
      emptyDir: {}

  extraVolumeMounts:
    - name: storage
      mountPath: /var/loki

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

gateway:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false

test:
  enabled: false
