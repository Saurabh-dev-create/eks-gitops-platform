apiVersion: v1
kind: Pod
metadata:
  name: no-liveness-pod
  labels:
    app: nginx
    environment: dev

spec:
  securityContext:
    runAsNonRoot: true

  containers:
    - name: nginx
      image: nginx:1.27

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
