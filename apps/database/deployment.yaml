apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  
  labels:
    app: database
    tier: database
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: database

  template:
    metadata:
      labels:
        app: database
        tier: database

    spec:
      containers:
      - name: database
        image: postgres:16
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: platformdb

        - name: POSTGRES_USER
          value: postgres

        - name: POSTGRES_PASSWORD
          value: postgres123

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi

        readinessProbe:
          tcpSocket:
            
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

        livenessProbe:
          tcpSocket:
            
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3